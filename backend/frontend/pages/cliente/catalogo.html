<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Catálogo — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/cliente/catalogo.html" class="active"><span class="icon">🛒</span>Catálogo</a>
      <a href="/pages/cliente/mis-alquileres.html"><span class="icon">📋</span>Mis Alquileres</a>
      <a href="/pages/cliente/perfil.html"><span class="icon">👤</span>Mi Perfil</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="topbar">
      <h1>🛒 Catálogo de Productos</h1>
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <button class="btn btn-primary" onclick="openModal('modal-carrito')" style="position:relative">
        🛒 Ver carrito
        <span class="cart-badge" id="cart-count">0</span>
      </button>
    </div>

    <!-- Filtros -->
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="form-group" style="margin:0;flex:1;min-width:180px;">
          <label>Buscar</label>
          <input class="form-control" id="q" placeholder="Nombre del producto..." oninput="cargarCatalogo()"/>
        </div>
        <div class="form-group" style="margin:0;">
          <label>Categoría</label>
          <select class="form-control" id="cat" onchange="cargarCatalogo()">
            <option value="">Todas</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Productos grid -->
    <div id="productos-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;"></div>
  </main>
</div>

<!-- MODAL CARRITO -->
<div class="modal-overlay" id="modal-carrito">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h2>🛒 Carrito de Alquiler</h2>
      <button class="modal-close" onclick="closeModal('modal-carrito')">×</button>
    </div>
    <div id="carrito-items"></div>
    <div id="carrito-resumen" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)"></div>
    <div class="form-row" style="margin-top:16px;">
      <div class="form-group">
        <label>Fecha de entrega</label>
        <input type="date" class="form-control" id="fecha-entrega"/>
      </div>
      <div class="form-group">
        <label>Fecha de recojo</label>
        <input type="date" class="form-control" id="fecha-recojo"/>
      </div>
    </div>
    <div class="form-group">
      <label>Dirección del evento</label>
      <input type="text" class="form-control" id="dir-evento" placeholder="Jr. Ejemplo 123, Huánuco"/>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center;margin-top:8px" onclick="confirmarAlquiler()">
      ✅ Confirmar Solicitud
    </button>
  </div>
</div>

<!-- MODAL RESULTADO QR -->
<div class="modal-overlay" id="modal-qr">
  <div class="modal" style="max-width:400px;text-align:center">
    <div class="modal-header">
      <h2>✅ Solicitud Creada</h2>
      <button class="modal-close" onclick="closeModal('modal-qr')">×</button>
    </div>
    <p style="margin-bottom:16px;color:var(--text-muted)">Guarda este QR. Será escaneado al entregar y recoger tu pedido.</p>
    <div id="qr-render" style="display:flex;justify-content:center;margin-bottom:16px;"></div>
    <p id="qr-info" style="font-size:.85rem;color:var(--text-muted)"></p>
    <a href="/pages/cliente/mis-alquileres.html" class="btn btn-primary" style="margin-top:12px;justify-content:center;width:100%">Ver mis alquileres</a>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('cliente')) throw new Error('no auth');

let carrito = [];

async function cargarCatalogo() {
  const q   = document.getElementById('q').value;
  const cat = document.getElementById('cat').value;
  let url = '/productos/catalogo?';
  if (q)   url += `q=${encodeURIComponent(q)}&`;
  if (cat) url += `categoria_id=${cat}`;
  try {
    const prods = await apiFetch(url);
    renderProductos(prods);
  } catch(e) { toast(e.message, 'error'); }
}

function renderProductos(prods) {
  const grid = document.getElementById('productos-grid');
  if (!prods.length) { grid.innerHTML = '<p style="color:var(--text-muted)">No hay productos disponibles.</p>'; return; }
  grid.innerHTML = prods.map(p => `
    <div class="card" style="padding:16px;">
      ${p.foto_url ? `<img src="${p.foto_url}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:12px;" />` : ''}
      <div style="font-weight:700;margin-bottom:4px">${p.nombre}</div>
      <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:8px">${p.categoria}</div>
      <div style="font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:4px">${sol(p.precio_unidad)}<span style="font-size:.75rem;font-weight:400;color:var(--text-muted)"> / unidad</span></div>
      <div style="font-size:.8rem;margin-bottom:12px">Disponible: <strong>${p.stock_disponible}</strong></div>
      ${p.stock_disponible > 0
        ? `<div style="display:flex;gap:8px;align-items:center">
             <input type="number" id="qty-${p.id}" min="1" max="${p.stock_disponible}" value="1" class="form-control" style="width:70px;padding:6px;" />
             <button class="btn btn-primary btn-sm" onclick="agregarAlCarrito(${p.id},'${p.nombre}',${p.precio_unidad},${p.stock_disponible})">+ Añadir</button>
           </div>`
        : '<span style="color:var(--danger);font-size:.85rem">Sin stock</span>'}
    </div>
  `).join('');
}

function agregarAlCarrito(id, nombre, precio, maxStock) {
  const qty = parseInt(document.getElementById(`qty-${id}`).value) || 1;
  if (qty < 1 || qty > maxStock) return toast('Cantidad inválida', 'warn');
  const idx = carrito.findIndex(x => x.producto_id === id);
  if (idx >= 0) {
    const nuevo = carrito[idx].cantidad + qty;
    if (nuevo > maxStock) return toast('No hay suficiente stock', 'warn');
    carrito[idx].cantidad = nuevo;
  } else {
    carrito.push({ producto_id: id, nombre, precio_unidad: precio, cantidad: qty });
  }
  actualizarCarritoUI();
  toast(`${nombre} añadido al carrito`);
}

function actualizarCarritoUI() {
  document.getElementById('cart-count').textContent = carrito.length;
  const cont = document.getElementById('carrito-items');
  if (!carrito.length) { cont.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px">Carrito vacío</p>'; renderResumen(); return; }
  cont.innerHTML = `<table><thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Sub.</th><th></th></tr></thead><tbody>
    ${carrito.map((item,i) => `
      <tr>
        <td>${item.nombre}</td>
        <td><input type="number" min="1" value="${item.cantidad}" style="width:60px;padding:4px;border:1px solid var(--border);border-radius:6px" onchange="cambiarCantidad(${i},this.value)"/></td>
        <td>${sol(item.precio_unidad)}</td>
        <td>${sol(item.precio_unidad * item.cantidad)}</td>
        <td><button class="btn btn-danger btn-sm" onclick="quitarItem(${i})">🗑</button></td>
      </tr>`).join('')}
  </tbody></table>`;
  renderResumen();
}

function cambiarCantidad(i, val) {
  carrito[i].cantidad = Math.max(1, parseInt(val) || 1);
  actualizarCarritoUI();
}
function quitarItem(i) { carrito.splice(i,1); actualizarCarritoUI(); }

function renderResumen() {
  const subtotal = carrito.reduce((s,x) => s + x.precio_unidad*x.cantidad, 0);
  document.getElementById('carrito-resumen').innerHTML = !carrito.length ? '' : `
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <span>Subtotal</span><strong>${sol(subtotal)}</strong>
    </div>
    <div style="font-size:.8rem;color:var(--text-muted)">+ Garantía y descuentos se calculan al confirmar</div>`;
}

async function confirmarAlquiler() {
  if (!carrito.length) return toast('Agrega productos al carrito', 'warn');
  const fe = document.getElementById('fecha-entrega').value;
  const fr = document.getElementById('fecha-recojo').value;
  const dir = document.getElementById('dir-evento').value.trim();
  if (!fe || !fr || !dir) return toast('Completa las fechas y la dirección', 'warn');
  if (new Date(fr) < new Date(fe)) return toast('La fecha de recojo no puede ser antes de la entrega', 'warn');

  try {
    const alq = await apiFetch('/alquileres', {
      method: 'POST',
      body: JSON.stringify({ items: carrito, fecha_entrega: fe, fecha_recojo: fr, direccion_evento: dir })
    });
    closeModal('modal-carrito');
    carrito = [];
    actualizarCarritoUI();
    // Generar QR
    document.getElementById('qr-render').innerHTML = '';
    new QRCode(document.getElementById('qr-render'), {
      text: `${window.location.origin}/pages/trabajador/qr-scan.html?token=${alq.qr_token}`,
      width: 200, height: 200
    });
    document.getElementById('qr-info').textContent = `Alquiler #${alq.id} | Total: ${sol(alq.total)}`;
    openModal('modal-qr');
  } catch(err) { toast(err.message, 'error'); }
}

async function cargarCategorias() {
  const cats = await apiFetch('/categorias');
  const sel = document.getElementById('cat');
  cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
}

// Fechas mínimas = hoy

  const hoy = new Date().toISOString().split('T')[0];
document.getElementById('fecha-entrega').min = hoy;
document.getElementById('fecha-recojo').min  = hoy;

cargarCategorias();
cargarCatalogo();

// 👇 AQUÍ PEGAS ESTA LÓGICA PARA EL MENÚ EN CELULARES 👇
const menuToggle = document.getElementById('menu-toggle');
const sidebar = document.querySelector('.sidebar');

if (menuToggle && sidebar) {
  // Abre y cierra el menú al hacer clic en el botón ☰
  menuToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    sidebar.classList.toggle('open');
  });

  // Cierra el menú automáticamente si tocas cualquier otra parte de la pantalla
  document.addEventListener('click', (e) => {
    if (!sidebar.contains(e.target) && sidebar.classList.contains('open')) {
      sidebar.classList.remove('open');
    }
  });
}
  
</script>
</body>
</html>
