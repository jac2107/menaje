<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mis Alquileres — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/cliente/catalogo.html"><span class="icon">🛒</span>Catálogo</a>
      <a href="/pages/cliente/mis-alquileres.html" class="active"><span class="icon">📋</span>Mis Alquileres</a>
      <a href="/pages/cliente/perfil.html"><span class="icon">👤</span>Mi Perfil</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>📋 Mis Alquileres</h1>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Fecha Entrega</th><th>Fecha Recojo</th><th>Dirección</th><th>Total</th><th>Estado</th><th>QR</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL QR -->
<div class="modal-overlay" id="modal-qr">
  <div class="modal" style="max-width:380px;text-align:center">
    <div class="modal-header">
      <h2>Código QR del Alquiler</h2>
      <button class="modal-close" onclick="closeModal('modal-qr')">×</button>
    </div>
    <p style="color:var(--text-muted);margin-bottom:16px;font-size:.9rem">Muestra este código al trabajador para registrar la entrega o recojo.</p>
    <div id="qr-container" style="display:flex;justify-content:center;"></div>
    <p id="qr-desc" style="margin-top:12px;font-size:.8rem;color:var(--text-muted)"></p>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2>Detalle del Alquiler</h2>
      <button class="modal-close" onclick="closeModal('modal-detalle')">×</button>
    </div>
    <div id="detalle-content"></div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('cliente')) throw new Error('no auth');

async function cargar() {
  try {
    const alqs = await apiFetch('/alquileres/mis');
    const tbody = document.getElementById('tbody');
    if (!alqs.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">No tienes alquileres aún. ¡Ve al catálogo!</td></tr>'; return; }
    tbody.innerHTML = alqs.map(a => `
      <tr>
        <td><a href="#" onclick="verDetalle(${a.id})">#${a.id}</a></td>
        <td>${fmtFecha(a.fecha_entrega)}</td>
        <td>${fmtFecha(a.fecha_recojo)}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${a.direccion_evento}</td>
        <td><strong>${sol(a.total)}</strong></td>
        <td>${badgeEstado(a.estado)}</td>
        <td>
          ${a.estado !== 'cerrado'
            ? `<button class="btn btn-outline btn-sm" onclick="mostrarQR('${a.qr_token}',${a.id})">📱 QR</button>`
            : '—'}
        </td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

function mostrarQR(token, id) {
  document.getElementById('qr-container').innerHTML = '';
  new QRCode(document.getElementById('qr-container'), {
    text: `${window.location.origin}/pages/trabajador/qr-scan.html?token=${token}`,
    width: 220, height: 220
  });
  document.getElementById('qr-desc').textContent = `Alquiler #${id}`;
  openModal('modal-qr');
}

async function verDetalle(id) {
  try {
    const a = await apiFetch(`/alquileres/${id}`);
    document.getElementById('detalle-content').innerHTML = `
      <div style="margin-bottom:16px">
        <strong>Estado:</strong> ${badgeEstado(a.estado)}<br/>
        <strong>Dirección:</strong> ${a.direccion_evento}<br/>
        <strong>Entrega:</strong> ${fmtFecha(a.fecha_entrega)} &nbsp; <strong>Recojo:</strong> ${fmtFecha(a.fecha_recojo)}
      </div>
      <table>
        <thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead>
        <tbody>
          ${a.items.map(i=>`<tr><td>${i.nombre}</td><td>${i.cantidad}</td><td>${sol(i.precio_unit)}</td><td>${sol(i.subtotal)}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
        <div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>${sol(a.subtotal)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Descuento (${a.descuento_pct}%)</span><span>-${sol(a.descuento_monto)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Garantía</span><span>${sol(a.garantia)}</span></div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;margin-top:8px"><span>TOTAL</span><span>${sol(a.total)}</span></div>
      </div>`;
    openModal('modal-detalle');
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
