      <a href="/pages/dueno/inventario.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"></path><path d="M3 8l9 5 9-5M12 13v8"></path></svg></span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="8" r="3.2"></circle><path d="M21 19v-1a4 4 0 0 0-3-3.8M16.5 5.2a3.2 3.2 0 0 1 0 5.6"></path></svg></span>Usuarios</a>

  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>Gestión de Alquileres</h1>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="form-group" style="margin:0;max-width:320px"><label>Cliente</label><input class="form-control" id="q" placeholder="Nombre..." oninput="cargar()"/></div>
    </div>
    <div class="filter-chips" id="filtro-estado">
      <button type="button" class="filter-chip active" data-val="">Todos</button>
      <button type="button" class="filter-chip" data-val="confirmado">Confirmado</button>
      <button type="button" class="filter-chip" data-val="entregado">Entregado</button>
      <button type="button" class="filter-chip" data-val="recogido">Recogido</button>
      <button type="button" class="filter-chip" data-val="en_revision">En revisión</button>
      <button type="button" class="filter-chip" data-val="cerrado">Cerrado</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Cliente</th><th>Entrega</th><th>Recojo</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL CIERRE GARANTÍA -->
<div class="modal-overlay" id="modal-cierre">
  <div class="modal">
    <div class="modal-header"><h2>Cerrar Alquiler y Gestionar Garantía</h2><button class="modal-close" onclick="closeModal('modal-cierre')">×</button></div>
    <input type="hidden" id="cierre-id"/>
    <div id="cierre-info" style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:16px;font-size:.9rem"></div>
    <div class="form-group"><label>Monto a descontar de la garantía (por daños)</label><input type="number" class="form-control" id="cierre-descuento" value="0" step="0.01"/></div>
    <div class="form-group"><label>Cobro adicional (si daños superan garantía)</label><input type="number" class="form-control" id="cierre-adicional" value="0" step="0.01"/></div>
    <div class="form-group"><label>Observaciones</label><textarea class="form-control" id="cierre-obs" rows="3" placeholder="Descripción de daños, acuerdos..."></textarea></div>
    <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="guardarCierre()">Cerrar Alquiler</button>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal" style="max-width:600px">
    <div class="modal-header"><h2>Detalle del Alquiler</h2><button class="modal-close" onclick="closeModal('modal-detalle')">×</button></div>
    <div id="detalle-body"></div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

let alquileres = [];
let estadoFiltro = '';

document.querySelectorAll('#filtro-estado .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filtro-estado .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    estadoFiltro = btn.dataset.val;
    cargar();
  });
});

async function cargar() {
  const q = document.getElementById('q').value;
  let url = '/alquileres?';
  if (q) url += `q=${encodeURIComponent(q)}&`;
  if (estadoFiltro) url += `estado=${estadoFiltro}`;
  try {
    alquileres = await apiFetch(url);
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = alquileres.map(a => `
      <tr class="row-clickable" onclick="verDetalle(${a.id})">
        <td>${a.cliente_nombre}</td>
        <td>${fmtFecha(a.fecha_entrega)} <small style="color:var(--text-muted)">${fmtHora(a.hora_entrega)}</small></td>
        <td>${fmtFecha(a.fecha_recojo)} <small style="color:var(--text-muted)">${fmtHora(a.hora_recojo)}</small></td>
        <td>${sol(a.total)}</td>
        <td>${badgeEstado(a.estado)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;white-space:nowrap">
            ${a.estado === 'recogido' ? `<a href="/pages/trabajador/revision.html?id=${a.id}" class="btn btn-outline btn-sm" onclick="event.stopPropagation()">Revisión</a>`
              : a.estado === 'en_revision' ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();abrirCierre(${a.id})">Cerrar</button>`
              : '—'}
          </div>
        </td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

async function verDetalle(id) {
  try {
    const a = await apiFetch(`/alquileres/${id}`);
    document.getElementById('detalle-body').innerHTML = `
      <div style="margin-bottom:16px">
        <p><strong>Cliente:</strong> ${a.cliente_nombre} | ${a.cliente_correo}</p>
        <p><strong>Teléfono:</strong> ${a.cliente_telefono||'—'}</p>
        <p><strong>Dirección:</strong> ${a.direccion_evento}</p>
        <p><strong>Entrega:</strong> ${fmtFecha(a.fecha_entrega)} ${fmtHora(a.hora_entrega)} &nbsp; <strong>Recojo:</strong> ${fmtFecha(a.fecha_recojo)} ${fmtHora(a.hora_recojo)}</p>
        <p><strong>Estado:</strong> ${badgeEstado(a.estado)}</p>
      </div>
      <table>
        <thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subtotal</th></tr></thead>
        <tbody>${a.items.map(i=>`<tr><td>${i.nombre}</td><td>${i.cantidad}</td><td>${sol(i.precio_unit)}</td><td>${sol(i.subtotal)}</td></tr>`).join('')}</tbody>
      </table>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
        <div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>${sol(a.subtotal)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Descuento (${a.descuento_pct}%)</span><span>-${sol(a.descuento_monto)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Garantía</span><span>${sol(a.garantia)}</span></div>
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;margin-top:8px"><span>TOTAL</span><span>${sol(a.total)}</span></div>
      </div>`;
    openModal('modal-detalle');
  } catch(e) { toast(e.message,'error'); }
}

async function abrirCierre(id) {
  try {
    const a = await apiFetch(`/alquileres/${id}`);
    document.getElementById('cierre-id').value = id;
    document.getElementById('cierre-info').innerHTML = `<strong>Garantía cobrada:</strong> ${sol(a.garantia)}<br/><small>Ingresa cuánto retener por daños. El resto se devuelve al cliente.</small>`;
    openModal('modal-cierre');
  } catch(e) { toast(e.message,'error'); }
}
async function guardarCierre() {
  const id = document.getElementById('cierre-id').value;
  try {
    const r = await apiFetch(`/alquileres/${id}/cerrar`, { method:'POST', body: JSON.stringify({
      monto_descontado: document.getElementById('cierre-descuento').value,
      monto_adicional:  document.getElementById('cierre-adicional').value,
      observaciones:    document.getElementById('cierre-obs').value
    })});
    toast(`Alquiler cerrado. Devuelto: ${sol(r.garantia_devuelta)}`);
    closeModal('modal-cierre'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
