<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Alquileres — Dueño — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/dueno/dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html" class="active"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon">👥</span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html"><span class="icon">🏷</span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon">📈</span>Reportes</a>
      <a href="/pages/dueno/configuracion.html"><span class="icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>📋 Gestión de Alquileres</h1>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="margin:0;flex:1"><label>Cliente</label><input class="form-control" id="q" placeholder="Nombre..." oninput="cargar()"/></div>
        <div class="form-group" style="margin:0">
          <label>Estado</label>
          <select class="form-control" id="estado" onchange="cargar()">
            <option value="">Todos</option>
            <option value="pendiente_pago">⏳ Pendiente de pago</option>
            <option value="confirmado">Confirmado</option>
            <option value="entregado">Entregado</option>
            <option value="recogido">Recogido</option>
            <option value="en_revision">En revisión</option>
            <option value="cerrado">Cerrado</option>
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Cliente</th><th>Entrega</th><th>Recojo</th><th>Total</th><th>Estado</th><th>Acciones</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- MODAL PAGO -->
<div class="modal-overlay" id="modal-pago">
  <div class="modal">
    <div class="modal-header"><h2>💳 Registrar Pago</h2><button class="modal-close" onclick="closeModal('modal-pago')">×</button></div>
    <input type="hidden" id="pago-id"/>
    <div class="form-group"><label>Monto</label><input type="number" class="form-control" id="pago-monto" step="0.01"/></div>
    <div class="form-group"><label>Método</label>
      <select class="form-control" id="pago-metodo">
        <option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option>
        <option value="yape">Yape</option><option value="plin">Plin</option>
      </select>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center" onclick="guardarPago()">✅ Confirmar</button>
  </div>
</div>

<!-- MODAL CIERRE GARANTÍA -->
<div class="modal-overlay" id="modal-cierre">
  <div class="modal">
    <div class="modal-header"><h2>🔒 Cerrar Alquiler y Gestionar Garantía</h2><button class="modal-close" onclick="closeModal('modal-cierre')">×</button></div>
    <input type="hidden" id="cierre-id"/>
    <div id="cierre-info" style="background:#f8fafc;padding:12px;border-radius:8px;margin-bottom:16px;font-size:.9rem"></div>
    <div class="form-group"><label>Monto a descontar de la garantía (por daños)</label><input type="number" class="form-control" id="cierre-descuento" value="0" step="0.01"/></div>
    <div class="form-group"><label>Cobro adicional (si daños superan garantía)</label><input type="number" class="form-control" id="cierre-adicional" value="0" step="0.01"/></div>
    <div class="form-group"><label>Observaciones</label><textarea class="form-control" id="cierre-obs" rows="3" placeholder="Descripción de daños, acuerdos..."></textarea></div>
    <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="guardarCierre()">🔒 Cerrar Alquiler</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

let alquileres = [];

async function cargar() {
  const q = document.getElementById('q').value;
  const e = document.getElementById('estado').value;
  let url = '/alquileres?';
  if (q) url += `q=${encodeURIComponent(q)}&`;
  if (e) url += `estado=${e}`;
  try {
    alquileres = await apiFetch(url);
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = alquileres.map(a => `
      <tr>
        <td>#${a.id}</td>
        <td>${a.cliente_nombre}</td>
        <td>${fmtFecha(a.fecha_entrega)}</td>
        <td>${fmtFecha(a.fecha_recojo)}</td>
        <td>${sol(a.total)}</td>
        <td>${badgeEstado(a.estado)}</td>
        <td style="display:flex;gap:6px;flex-wrap:wrap;">
          ${a.estado === 'pendiente_pago' ? `<button class="btn btn-primary btn-sm" onclick="abrirPago(${a.id},${a.total})">💳 Pagar</button>` : ''}
          ${a.estado === 'recogido' ? `<a href="/pages/trabajador/revision.html?id=${a.id}" class="btn btn-outline btn-sm">📝 Revisión</a>` : ''}
          ${a.estado === 'en_revision' ? `<button class="btn btn-danger btn-sm" onclick="abrirCierre(${a.id})">🔒 Cerrar</button>` : ''}
        </td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

function abrirPago(id, total) {
  document.getElementById('pago-id').value = id;
  document.getElementById('pago-monto').value = total;
  openModal('modal-pago');
}
async function guardarPago() {
  const id = document.getElementById('pago-id').value;
  try {
    await apiFetch(`/alquileres/${id}/pago`, { method:'POST', body: JSON.stringify({ monto: document.getElementById('pago-monto').value, metodo: document.getElementById('pago-metodo').value }) });
    toast('Pago registrado'); closeModal('modal-pago'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

async function abrirCierre(id) {
  try {
    const a = await apiFetch(`/alquileres/${id}`);
    document.getElementById('cierre-id').value = id;
    document.getElementById('cierre-info').innerHTML = `<strong>Garantía cobrada:</strong> ${sol(a.garantia)}<br/><small>Ingresa cuánto retener por daños. El resto se devuelve al cliente.</small>`;
    openModal('modal-cierre');
  } catch(e) { toast(e.message,'error'); }
}
async function guardarCierre() {
  const id = document.getElementById('cierre-id').value;
  try {
    const r = await apiFetch(`/alquileres/${id}/cerrar`, { method:'POST', body: JSON.stringify({
      monto_descontado: document.getElementById('cierre-descuento').value,
      monto_adicional:  document.getElementById('cierre-adicional').value,
      observaciones:    document.getElementById('cierre-obs').value
    })});
    toast(`Alquiler cerrado. Devuelto: ${sol(r.garantia_devuelta)}`);
    closeModal('modal-cierre'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
