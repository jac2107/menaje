<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Configuración — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/dueno/dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon">👥</span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html"><span class="icon">🏷</span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon">📈</span>Reportes</a>
      <a href="/pages/dueno/configuracion.html" class="active"><span class="icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>⚙️ Configuración</h1></div>
    <div class="card" style="max-width:480px">
      <div class="card-title">💰 Monto de Garantía por Alquiler</div>
      <p style="color:var(--text-muted);margin-bottom:16px;font-size:.9rem">Este monto se añade automáticamente al total de cada alquiler y se gestiona al cerrar.</p>
      <div class="form-group">
        <label>Garantía fija (S/)</label>
        <input type="number" class="form-control" id="garantia-val" step="0.01" min="0"/>
      </div>
      <button class="btn btn-success" onclick="guardar()">💾 Guardar</button>
    </div>
  </main>
</div>
<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');
async function cargar() {
  try {
    const cfg = await apiFetch('/configuracion');
    document.getElementById('garantia-val').value = cfg.garantia_monto || 500;
  } catch(e) { toast(e.message,'error'); }
}
async function guardar() {
  const valor = document.getElementById('garantia-val').value;
  try {
    await apiFetch('/configuracion', { method:'PUT', body: JSON.stringify({ clave:'garantia_monto', valor }) });
    toast('Configuración guardada');
  } catch(e) { toast(e.message,'error'); }
}
cargar();
</script>
</body>
</html>
