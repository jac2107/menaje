<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard Dueño — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/dueno/dashboard.html" class="active"><span class="icon">📊</span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon">👥</span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html"><span class="icon">🏷</span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon">📈</span>Reportes</a>
      <a href="/pages/dueno/configuracion.html"><span class="icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>

  <main class="main-content">
   <div class="topbar">
  <h1>📊 Dashboard</h1>
  <button id="menu-toggle" class="btn-menu-toggle">☰</button>
</div>
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Alquileres Activos</div><div class="kpi-value" id="kpi-activos">—</div></div>
      <div class="kpi-card green"><div class="kpi-label">Ingresos del Mes</div><div class="kpi-value" id="kpi-ingresos">—</div></div>
      <div class="kpi-card amber"><div class="kpi-label">Productos con Bajo Stock</div><div class="kpi-value" id="kpi-stock">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Clientes Frecuentes</div><div class="kpi-value" id="kpi-frecuentes">—</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title">📋 Alquileres próximos a entregar</div>
        <div id="proximos-tbody"><p style="color:var(--text-muted)">Cargando...</p></div>
      </div>
      <div class="card">
        <div class="card-title">⚠️ Productos con stock ≤ 5</div>
        <div id="stock-bajo-list"><p style="color:var(--text-muted)">Cargando...</p></div>
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

async function cargar() {
  try {
    const [kpis, alqs, prods] = await Promise.all([
      apiFetch('/reportes/dashboard'),
      apiFetch('/alquileres?estado=confirmado'),
      apiFetch('/productos')
    ]);

    document.getElementById('kpi-activos').textContent    = kpis.alquileres_activos;
    document.getElementById('kpi-ingresos').textContent   = sol(kpis.ingresos_mes);
    document.getElementById('kpi-stock').textContent      = kpis.productos_stock_bajo;
    document.getElementById('kpi-frecuentes').textContent = kpis.clientes_frecuentes;

    // Próximos a entregar (confirmados)
    const proximos = alqs.slice(0, 5);
    document.getElementById('proximos-tbody').innerHTML = proximos.length
      ? proximos.map(a => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><strong>#${a.id}</strong> ${a.cliente_nombre}</div>
          <div>${fmtFecha(a.fecha_entrega)} ${badgeEstado(a.estado)}</div>
        </div>`).join('')
      : '<p style="color:var(--text-muted)">No hay alquileres confirmados</p>';

    // Productos bajo stock
    const bajo = prods.filter(p => p.disponible <= 5);
    document.getElementById('stock-bajo-list').innerHTML = bajo.length
      ? bajo.map(p => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>${p.nombre}</div>
          <strong style="color:${p.disponible<=2?'var(--danger)':'var(--warn)'}">${p.disponible} disp.</strong>
        </div>`).join('')
      : '<p style="color:var(--success)">✅ Todo el inventario con buen stock</p>';

  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
