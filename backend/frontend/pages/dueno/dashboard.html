    <nav>
      <a href="/pages/dueno/dashboard.html" class="active"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"></rect><rect x="14" y="3" width="7" height="7" rx="1.6"></rect><rect x="3" y="14" width="7" height="7" rx="1.6"></rect><rect x="14" y="14" width="7" height="7" rx="1.6"></rect></svg></span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"></path><path d="M3 8l9 5 9-5M12 13v8"></path></svg></span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="8" r="3.2"></circle><path d="M21 19v-1a4 4 0 0 0-3-3.8M16.5 5.2a3.2 3.2 0 0 1 0 5.6"></path></svg></span>Usuarios</a>

    <div id="sidebar-alertas"></div>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>

  <main class="main-content">
   <div class="topbar">
  <h1>Dashboard</h1>
  <button id="menu-toggle" class="btn-menu-toggle">☰</button>
</div>
    <div class="kpi-grid" id="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Alquileres Activos</div><div class="kpi-value" id="kpi-activos">—</div></div>
      <div class="kpi-card green"><div class="kpi-label">Ingresos del Mes</div><div class="kpi-value" id="kpi-ingresos">—</div></div>
      <div class="kpi-card amber"><div class="kpi-label">Productos con Bajo Stock</div><div class="kpi-value" id="kpi-stock">—</div></div>
      <div class="kpi-card"><div class="kpi-label">Clientes Frecuentes</div><div class="kpi-value" id="kpi-frecuentes">—</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card">
        <div class="card-title"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2.4"></rect><path d="M16 3v4M8 3v4M3 10h18"></path></svg> Alquileres próximos a entregar</div>
        <div id="proximos-tbody"><p style="color:var(--text-muted)">Cargando...</p></div>
      </div>
      <div class="card">
        <div class="card-title"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3Z"></path><line x1="12" y1="10" x2="12" y2="14.5"></line><circle cx="12" cy="17.6" r="0.7" fill="currentColor" stroke="none"></circle></svg> Productos con stock ≤ 5</div>
        <div id="stock-bajo-list"><p style="color:var(--text-muted)">Cargando...</p></div>
      </div>
    </div>
  </main>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

async function cargar() {
  try {
    const [kpis, alqs, prods] = await Promise.all([
      apiFetch('/reportes/dashboard'),
      apiFetch('/alquileres?estado=confirmado'),
      apiFetch('/productos')
    ]);

    document.getElementById('kpi-activos').textContent    = kpis.alquileres_activos;
    document.getElementById('kpi-ingresos').textContent   = sol(kpis.ingresos_mes);
    document.getElementById('kpi-stock').textContent      = kpis.productos_stock_bajo;
    document.getElementById('kpi-frecuentes').textContent = kpis.clientes_frecuentes;

    // Próximos a entregar (confirmados)
    const proximos = alqs.slice(0, 5);
    document.getElementById('proximos-tbody').innerHTML = proximos.length
      ? proximos.map(a => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div><strong>${a.cliente_nombre}</strong></div>
          <div>${fmtFecha(a.fecha_entrega)} ${fmtHora(a.hora_entrega)} ${badgeEstado(a.estado)}</div>
        </div>`).join('')
      : '<p style="color:var(--text-muted)">No hay alquileres confirmados</p>';

    // Productos bajo stock
    const bajo = prods.filter(p => p.disponible <= 5);
    document.getElementById('stock-bajo-list').innerHTML = bajo.length
      ? bajo.map(p => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <div>${p.nombre}</div>
          <strong style="color:${p.disponible<=2?'var(--danger)':'var(--warn)'}">${p.disponible} disp.</strong>
        </div>`).join('')
      : '<p style="color:var(--success)">Todo el inventario con buen stock</p>';

  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
