<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Descuentos — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/dueno/dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon">👥</span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html" class="active"><span class="icon">🏷</span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon">📈</span>Reportes</a>
      <a href="/pages/dueno/configuracion.html"><span class="icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>🏷 Clientes Frecuentes / Descuentos</h1>
      <button class="btn btn-primary" onclick="openModal('modal-asignar')">+ Asignar Descuento</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Cliente</th><th>Correo</th><th>Descuento</th><th>Actualizar</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-asignar">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h2>🏷 Asignar Descuento</h2><button class="modal-close" onclick="closeModal('modal-asignar')">×</button></div>
    <div class="form-group"><label>Cliente</label>
      <select class="form-control" id="d-usuario"></select>
    </div>
    <div class="form-group"><label>Porcentaje de descuento (%)</label>
      <input type="number" class="form-control" id="d-pct" min="1" max="50" placeholder="Ej: 10"/>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center" onclick="guardarDescuento()">✅ Guardar</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

async function cargar() {
  try {
    const descs = await apiFetch('/descuentos');
    document.getElementById('tbody').innerHTML = descs.length
      ? descs.map(d => `<tr><td><strong>${d.cliente_nombre}</strong></td><td>${d.cliente_correo}</td><td><strong style="color:var(--success);font-size:1.1rem">${d.porcentaje}%</strong></td>
          <td><button class="btn btn-outline btn-sm" onclick="editarDescuento(${d.usuario_id},${d.porcentaje})">✏️ Editar</button></td></tr>`).join('')
      : '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Sin descuentos asignados</td></tr>';
  } catch(e) { toast(e.message,'error'); }
}

async function cargarClientes() {
  const users = await apiFetch('/usuarios?rol=cliente');
  const sel = document.getElementById('d-usuario');
  sel.innerHTML = users.map(u => `<option value="${u.id}">${u.nombre} (${u.correo})</option>`).join('');
}

function editarDescuento(uid, pct) {
  document.getElementById('d-usuario').value = uid;
  document.getElementById('d-pct').value = pct;
  openModal('modal-asignar');
}

async function guardarDescuento() {
  const uid = document.getElementById('d-usuario').value;
  const pct = document.getElementById('d-pct').value;
  if (!uid || !pct) return toast('Completa los datos','warn');
  try {
    await apiFetch('/descuentos', { method:'POST', body: JSON.stringify({ usuario_id: uid, porcentaje: pct }) });
    toast('Descuento guardado'); closeModal('modal-asignar'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargarClientes();
cargar();
</script>
</body>
</html>
