    <nav>

      <a href="/pages/dueno/alquileres.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"></path><path d="M3 8l9 5 9-5M12 13v8"></path></svg></span>Inventario</a>
      <a href="/pages/dueno/usuarios.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="8" r="3.2"></circle><path d="M21 19v-1a4 4 0 0 0-3-3.8M16.5 5.2a3.2 3.2 0 0 1 0 5.6"></path></svg></span>Usuarios</a>

    </nav>
    <div id="sidebar-alertas"></div>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>Clientes Frecuentes / Descuentos</h1>
      <button class="btn btn-primary" onclick="openModal('modal-asignar')">+ Asignar Descuento</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Cliente</th><th>Correo</th><th>Descuento</th><th>Actualizar</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-asignar">
  <div class="modal" style="max-width:420px">
    <div class="modal-header"><h2>Asignar Descuento</h2><button class="modal-close" onclick="closeModal('modal-asignar')">×</button></div>
    <div class="form-group"><label>Cliente</label>
      <select class="form-control" id="d-usuario"></select>
    </div>
    <div class="form-group"><label>Porcentaje de descuento (%)</label>
      <input type="number" class="form-control" id="d-pct" min="1" max="50" placeholder="Ej: 10"/>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center" onclick="guardarDescuento()">Guardar</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

async function cargar() {
  try {
    const descs = await apiFetch('/descuentos');
    document.getElementById('tbody').innerHTML = descs.length
      ? descs.map(d => `<tr><td><strong>${d.cliente_nombre}</strong></td><td>${d.cliente_correo}</td><td><strong style="color:var(--success);font-size:1.1rem">${d.porcentaje}%</strong></td>
          <td><button class="btn btn-outline btn-sm" onclick="editarDescuento(${d.usuario_id},${d.porcentaje})">Editar</button></td></tr>`).join('')
      : '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">Sin descuentos asignados</td></tr>';
  } catch(e) { toast(e.message,'error'); }
}

async function cargarClientes() {
  const users = await apiFetch('/usuarios?rol=cliente');
  const sel = document.getElementById('d-usuario');
  sel.innerHTML = users.map(u => `<option value="${u.id}">${u.nombre} (${u.correo})</option>`).join('');
}

function editarDescuento(uid, pct) {
  document.getElementById('d-usuario').value = uid;
  document.getElementById('d-pct').value = pct;
  openModal('modal-asignar');
}

async function guardarDescuento() {
  const uid = document.getElementById('d-usuario').value;
  const pct = document.getElementById('d-pct').value;
  if (!uid || !pct) return toast('Completa los datos','warn');
  try {
    await apiFetch('/descuentos', { method:'POST', body: JSON.stringify({ usuario_id: uid, porcentaje: pct }) });
    toast('Descuento guardado'); closeModal('modal-asignar'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargarClientes();
cargar();
</script>
</body>
</html>
