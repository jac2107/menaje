</head>
<body>

    <a href="/pages/dueno/mi-cuenta.html" class="sidebar-user" style="display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;cursor:pointer"><div id="sidebar-user-avatar" style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#36ada3,#2f578a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex:none"></div><div style="min-width:0"><strong id="sidebar-user-name" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></strong><span id="sidebar-user-rol"></span></div></a>
    <nav>
      <a href="/pages/dueno/dashboard.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"></rect><rect x="14" y="3" width="7" height="7" rx="1.6"></rect><rect x="3" y="14" width="7" height="7" rx="1.6"></rect><rect x="14" y="14" width="7" height="7" rx="1.6"></rect></svg></span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"></path><path d="M3 8l9 5 9-5M12 13v8"></path></svg></span>Inventario</a>
      <a href="/pages/dueno/usuarios.html" class="active"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M16 19v-1a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v1"></path><circle cx="9.5" cy="8" r="3.2"></circle><path d="M21 19v-1a4 4 0 0 0-3-3.8M16.5 5.2a3.2 3.2 0 0 1 0 5.6"></path></svg></span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="7" cy="7" r="2.3"></circle><circle cx="17" cy="17" r="2.3"></circle></svg></span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="12"></line><line x1="12" y1="20" x2="12" y2="5"></line><line x1="18" y1="20" x2="18" y2="9"></line></svg></span>Reportes</a>
      <a href="/pages/dueno/configuracion.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="8" x2="20" y2="8"></line><line x1="4" y1="16" x2="20" y2="16"></line><circle cx="9" cy="8" r="2.4"></circle><circle cx="15" cy="16" r="2.4"></circle></svg></span>Configuración</a>
    </nav>
    <div id="sidebar-alertas"></div>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>Usuarios</h1>
      <button class="btn btn-primary" onclick="openModal('modal-nuevo')">+ Nuevo Trabajador</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div class="form-group" style="margin:0;max-width:320px"><label>Buscar</label><input class="form-control" id="q" oninput="cargar()"/></div>
    </div>
    <div class="filter-chips" id="filtro-rol">
      <button type="button" class="filter-chip active" data-val="">Todos</button>
      <button type="button" class="filter-chip" data-val="cliente">Cliente</button>
      <button type="button" class="filter-chip" data-val="trabajador">Trabajador</button>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>DNI</th><th>Correo</th><th>Teléfono</th><th>Rol</th><th>Estado</th><th>Acción</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-nuevo">
  <div class="modal">
    <div class="modal-header"><h2>+ Nuevo Trabajador</h2><button class="modal-close" onclick="closeModal('modal-nuevo')">×</button></div>
    <div class="form-row">
      <div class="form-group"><label>Nombre</label><input class="form-control" id="u-nombre"/></div>
      <div class="form-group"><label>DNI</label><input class="form-control" id="u-dni" maxlength="8"/></div>
    </div>
    <div class="form-group"><label>Teléfono</label><input class="form-control" id="u-tel"/></div>
    <div class="form-group"><label>Correo</label><input type="email" class="form-control" id="u-correo"/></div>
    <div class="form-group"><label>Contraseña</label><input type="password" class="form-control" id="u-pass"/></div>
    <div class="form-group"><label>Rol</label>
      <select class="form-control" id="u-rol"><option value="trabajador">Trabajador</option><option value="cliente">Cliente</option></select>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center" onclick="crearUsuario()">Crear Usuario</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

let rolFiltro = '';
document.querySelectorAll('#filtro-rol .filter-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#filtro-rol .filter-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    rolFiltro = btn.dataset.val;
    cargar();
  });
});

async function cargar() {
  const q = document.getElementById('q').value;
  let url = '/usuarios?'; if (q) url+=`q=${encodeURIComponent(q)}&`; if (rolFiltro) url+=`rol=${rolFiltro}`;
  try {
    const users = await apiFetch(url);
    document.getElementById('tbody').innerHTML = users.map(u => `
      <tr>
        <td><strong>${u.nombre}</strong></td><td>${u.dni}</td><td>${u.correo}</td>
        <td>${u.telefono||'—'}</td>
        <td><span class="badge ${u.rol==='trabajador'?'badge-confirmado':u.rol==='dueno'?'badge-entregado':'badge-pendiente'}">${u.rol}</span></td>
        <td><span class="badge ${u.activo?'badge-entregado':'badge-cerrado'}">${u.activo?'Activo':'Inactivo'}</span></td>
        <td>
          ${u.rol !== 'dueno' ? `<button class="btn btn-outline btn-sm" onclick="toggleUser(${u.id})">${u.activo?'Desactivar':'Activar'}</button>` : '—'}
        </td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

async function crearUsuario() {
  const payload = { nombre: document.getElementById('u-nombre').value.trim(), dni: document.getElementById('u-dni').value.trim(), telefono: document.getElementById('u-tel').value.trim(), correo: document.getElementById('u-correo').value.trim(), password: document.getElementById('u-pass').value, rol: document.getElementById('u-rol').value };
  try {
    await apiFetch('/usuarios', { method:'POST', body: JSON.stringify(payload) });
    toast('Usuario creado'); closeModal('modal-nuevo'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

async function toggleUser(id) {
  try {
    const r = await apiFetch(`/usuarios/${id}/toggle`, { method:'PATCH' });
    toast(`${r.nombre} ${r.activo?'activado':'desactivado'}`); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
