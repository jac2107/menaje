<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Usuarios — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/dueno/dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a href="/pages/dueno/alquileres.html"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/dueno/inventario.html"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/dueno/usuarios.html" class="active"><span class="icon">👥</span>Usuarios</a>
      <a href="/pages/dueno/descuentos.html"><span class="icon">🏷</span>Descuentos</a>
      <a href="/pages/dueno/reportes.html"><span class="icon">📈</span>Reportes</a>
      <a href="/pages/dueno/configuracion.html"><span class="icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>👥 Usuarios</h1>
      <button class="btn btn-primary" onclick="openModal('modal-nuevo')">+ Nuevo Trabajador</button>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="margin:0;flex:1"><label>Buscar</label><input class="form-control" id="q" oninput="cargar()"/></div>
        <div class="form-group" style="margin:0"><label>Rol</label>
          <select class="form-control" id="rol" onchange="cargar()">
            <option value="">Todos</option><option value="cliente">Cliente</option><option value="trabajador">Trabajador</option>
          </select>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>DNI</th><th>Correo</th><th>Teléfono</th><th>Rol</th><th>Estado</th><th>Acción</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal-nuevo">
  <div class="modal">
    <div class="modal-header"><h2>+ Nuevo Trabajador</h2><button class="modal-close" onclick="closeModal('modal-nuevo')">×</button></div>
    <div class="form-row">
      <div class="form-group"><label>Nombre</label><input class="form-control" id="u-nombre"/></div>
      <div class="form-group"><label>DNI</label><input class="form-control" id="u-dni" maxlength="8"/></div>
    </div>
    <div class="form-group"><label>Teléfono</label><input class="form-control" id="u-tel"/></div>
    <div class="form-group"><label>Correo</label><input type="email" class="form-control" id="u-correo"/></div>
    <div class="form-group"><label>Contraseña</label><input type="password" class="form-control" id="u-pass"/></div>
    <div class="form-group"><label>Rol</label>
      <select class="form-control" id="u-rol"><option value="trabajador">Trabajador</option><option value="cliente">Cliente</option></select>
    </div>
    <button class="btn btn-success" style="width:100%;justify-content:center" onclick="crearUsuario()">✅ Crear Usuario</button>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('dueno')) throw new Error('no auth');

async function cargar() {
  const q = document.getElementById('q').value;
  const r = document.getElementById('rol').value;
  let url = '/usuarios?'; if (q) url+=`q=${encodeURIComponent(q)}&`; if (r) url+=`rol=${r}`;
  try {
    const users = await apiFetch(url);
    document.getElementById('tbody').innerHTML = users.map(u => `
      <tr>
        <td><strong>${u.nombre}</strong></td><td>${u.dni}</td><td>${u.correo}</td>
        <td>${u.telefono||'—'}</td>
        <td><span class="badge ${u.rol==='trabajador'?'badge-confirmado':u.rol==='dueno'?'badge-entregado':'badge-pendiente'}">${u.rol}</span></td>
        <td><span class="badge ${u.activo?'badge-entregado':'badge-cerrado'}">${u.activo?'Activo':'Inactivo'}</span></td>
        <td>
          ${u.rol !== 'dueno' ? `<button class="btn btn-outline btn-sm" onclick="toggleUser(${u.id})">${u.activo?'Desactivar':'Activar'}</button>` : '—'}
        </td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

async function crearUsuario() {
  const payload = { nombre: document.getElementById('u-nombre').value.trim(), dni: document.getElementById('u-dni').value.trim(), telefono: document.getElementById('u-tel').value.trim(), correo: document.getElementById('u-correo').value.trim(), password: document.getElementById('u-pass').value, rol: document.getElementById('u-rol').value };
  try {
    await apiFetch('/usuarios', { method:'POST', body: JSON.stringify(payload) });
    toast('Usuario creado'); closeModal('modal-nuevo'); cargar();
  } catch(e) { toast(e.message,'error'); }
}

async function toggleUser(id) {
  try {
    const r = await apiFetch(`/usuarios/${id}/toggle`, { method:'PATCH' });
    toast(`${r.nombre} ${r.activo?'activado':'desactivado'}`); cargar();
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
