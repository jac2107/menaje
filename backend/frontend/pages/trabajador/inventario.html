<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inventario — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">🍽 <span>Menaje</span></div>
    <div class="sidebar-user"><strong id="sidebar-user-name"></strong><span id="sidebar-user-rol"></span></div>
    <nav>
      <a href="/pages/trabajador/dashboard.html"><span class="icon">📋</span>Alquileres</a>
      <a href="/pages/trabajador/inventario.html" class="active"><span class="icon">📦</span>Inventario</a>
      <a href="/pages/trabajador/qr-scan.html"><span class="icon">📱</span>Escanear QR</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar"><button id="menu-toggle" class="btn-menu-toggle">☰</button><h1>📦 Inventario</h1></div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="margin:0;flex:1"><label>Buscar</label><input class="form-control" id="q" placeholder="Nombre..." oninput="cargar()"/></div>
        <div class="form-group" style="margin:0"><label>Categoría</label><select class="form-control" id="cat" onchange="cargar()"><option value="">Todas</option></select></div>
      </div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Producto</th><th>Categoría</th><th>Precio</th><th>Stock Total</th><th>Bajas</th><th>En Eventos</th><th>Disponible</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="/assets/js/app.js"></script>
<script>
if (!['trabajador','dueno'].includes(Auth.usuario?.rol)) { location.href='/index.html'; throw new Error('rol'); }

async function cargar() {
  const q   = document.getElementById('q').value;
  const cat = document.getElementById('cat').value;
  let url = '/productos?';
  if (q)   url += `q=${encodeURIComponent(q)}&`;
  if (cat) url += `categoria_id=${cat}`;
  try {
    const prods = await apiFetch(url);
    const tbody = document.getElementById('tbody');
    if (!prods.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Sin productos</td></tr>'; return; }
    tbody.innerHTML = prods.map(p => `
      <tr>
        <td><strong>${p.nombre}</strong></td>
        <td>${p.categoria}</td>
        <td>${sol(p.precio_unidad)}</td>
        <td>${p.stock_total}</td>
        <td style="color:var(--danger)">${p.stock_baja}</td>
        <td style="color:var(--warn)">${p.en_eventos}</td>
        <td><strong style="color:${p.disponible<=5?'var(--danger)':'var(--success)'}">${p.disponible}</strong></td>
      </tr>`).join('');
  } catch(e) { toast(e.message,'error'); }
}

async function cargarCategorias() {
  const cats = await apiFetch('/categorias');
  const sel = document.getElementById('cat');
  cats.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
}

cargarCategorias();
cargar();
</script>
</body>
</html>
