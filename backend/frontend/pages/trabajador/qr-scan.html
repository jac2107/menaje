<body>

    <nav>
      <a href="/pages/trabajador/dashboard.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Alquileres</a>

      <a href="/pages/trabajador/qr-scan.html" class="active"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><path d="M14 14h3v3M14 21h3M21 14v3M21 21h.01"></path></svg></span>Escanear QR</a>
    </nav>
    <div id="sidebar-alertas"></div>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>

  <main class="main-content">
    <div class="topbar"><button id="menu-toggle" class="btn-menu-toggle">☰</button><h1>Escanear QR</h1></div>

    <!-- Ingreso manual de token (desde URL o teclado) -->
    <div class="card" style="max-width:560px;margin:0 auto">
      <p style="color:var(--text-muted);margin-bottom:16px">
        Ingresa el token del QR (se autorrellena si vienes desde un código QR escaneado) o pégalo manualmente.
      </p>
      <div class="form-group">
        <label>Token QR</label>
        <input class="form-control" id="token-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
      </div>
      <button class="btn btn-primary" onclick="consultarQR()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg> Consultar</button>
      <div style="margin-top:20px">
  <button class="btn btn-outline" id="btn-camara" onclick="toggleCamara()">Escanear con cámara</button>
  <div id="camara-box" style="display:none;margin-top:16px">
    <div id="qr-reader" style="width:100%;border-radius:8px;overflow:hidden;"></div>
    <button class="btn btn-danger btn-sm" style="margin-top:10px" onclick="detenerCamara()">Cerrar cámara</button>
  </div>
</div>
    </div>

    <!-- Resultado -->
    <div id="resultado" style="max-width:560px;margin:16px auto;display:none"></div>
  </main>
</div>

<script src="/assets/js/app.js"></script>
<script>
// Acepta ambos roles
// Extraer el token del QR de la URL ANTES de cualquier validación de sesión
const params = new URLSearchParams(location.search);
const qrTokenFromUrl = params.get('token');

// Acepta ambos roles
if (!Auth.token) {
  if (qrTokenFromUrl) localStorage.setItem('pending_qr_token', qrTokenFromUrl);
  location.href = '/index.html';
  throw new Error('no auth');
}
if (!['trabajador','dueno'].includes(Auth.usuario?.rol)) {
  if (qrTokenFromUrl) localStorage.setItem('pending_qr_token', qrTokenFromUrl);
  location.href = '/index.html';
  throw new Error('rol');
}

// Auto-rellenar: prioriza el token de la URL actual; si no hay, usa uno pendiente guardado en el login
const tokenPendiente = qrTokenFromUrl || localStorage.getItem('pending_qr_token');
if (tokenPendiente) {
  document.getElementById('token-input').value = tokenPendiente;
  localStorage.removeItem('pending_qr_token'); // se consume una sola vez
  setTimeout(consultarQR, 400);
}

async function consultarQR() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return toast('Ingresa un token', 'warn');
  try {
    const data = await apiFetch(`/qr/${token}`);
    mostrarResultado(data, token);
  } catch(e) { toast(e.message,'error'); }
}

function mostrarResultado({ alquiler: a, siguiente_estado }, token) {
  const div = document.getElementById('resultado');
  div.style.display = '';

  const accionLabel = {
    entregado:   'Marcar como ENTREGADO',
    recogido:    'Marcar como RECOGIDO',
    en_revision: 'Pasar a REVISIÓN'
  }[siguiente_estado];

  div.innerHTML = `
    <div class="card">
      <div class="card-title">Alquiler #${a.id}</div>
      <div style="display:grid;gap:8px;margin-bottom:16px">
        <div><strong>Cliente:</strong> ${a.cliente_nombre}</div>
        <div><strong>Dirección:</strong> ${a.direccion_evento}</div>
        <div><strong>Entrega:</strong> ${fmtFecha(a.fecha_entrega)} &nbsp; <strong>Recojo:</strong> ${fmtFecha(a.fecha_recojo)}</div>
        <div><strong>Total:</strong> ${sol(a.total)}</div>
        <div><strong>Estado actual:</strong> ${badgeEstado(a.estado)}</div>
      </div>
      ${siguiente_estado
        ? `<button class="btn btn-success" onclick="avanzar('${token}')">${accionLabel}</button>`
        : `<div style="color:var(--text-muted);padding:12px;background:#f8fafc;border-radius:8px">
             Este alquiler ya no tiene transiciones pendientes por QR (estado: <strong>${a.estado}</strong>)
           </div>`}
    </div>`;
}

async function avanzar(token) {
  try {
    const r = await apiFetch(`/qr/${token}/avanzar`, { method:'POST' });
    toast(`Estado actualizado: ${r.estado}`);
    consultarQR();
  } catch(e) { toast(e.message,'error'); }
}
let html5QrCode = null;

function toggleCamara() {
  const box = document.getElementById('camara-box');
  box.style.display = '';
  document.getElementById('btn-camara').style.display = 'none';

  html5QrCode = new Html5Qrcode('qr-reader');

  const config = {
    fps: 15,
    qrbox: { width: 300, height: 300 },
    aspectRatio: 1.0,
    disableFlip: false,
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: true   // usa el decodificador nativo del navegador si está disponible
    },
    videoConstraints: {
      // Sin esto, getUserMedia entrega un stream de baja resolución por defecto
      // en muchos navegadores móviles, insuficiente para decodificar el QR.
      width:  { min: 1280, ideal: 1920 },
      height: { min: 720,  ideal: 1080 }
    }
  };

  const onScanSuccess = (decodedText) => {
    try {
      const url = new URL(decodedText);
      const token = url.searchParams.get('token') || decodedText;
      document.getElementById('token-input').value = token;
    } catch {
      document.getElementById('token-input').value = decodedText;
    }
    detenerCamara();
    consultarQR();
  };

  const onScanFailure = (errorMessage) => {
    console.debug('[QR scan] intento de lectura sin éxito:', errorMessage);
  };

  html5QrCode.start({ facingMode: { exact: 'environment' } }, config, onScanSuccess, onScanFailure)
    .catch((err) => {
      console.warn('Cámara trasera exacta no disponible, reintentando en modo flexible:', err);
      html5QrCode.start({ facingMode: 'environment' }, config, onScanSuccess, onScanFailure)
        .catch((err2) => toast('No se pudo acceder a la cámara: ' + err2, 'error'));
    });
}

function detenerCamara() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
  document.getElementById('camara-box').style.display = 'none';
  document.getElementById('btn-camara').style.display = '';
}
</script>
</body>
