<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Revisión de Alquiler — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand" style="display:flex;align-items:center;gap:10px"><img src="/assets/img/logo.png" alt="Menaje" width="28" height="28" style="object-fit:contain;flex:none"><span>Menaje</span></div>
    <a href="/pages/trabajador/mi-cuenta.html" class="sidebar-user" style="display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;cursor:pointer"><div id="sidebar-user-avatar" style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#36ada3,#2f578a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex:none"></div><div style="min-width:0"><strong id="sidebar-user-name" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></strong><span id="sidebar-user-rol"></span></div></a>
    <nav>
      <a href="/pages/trabajador/dashboard.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Alquileres</a>
      <a href="/pages/trabajador/inventario.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8 12 3 3 8v8l9 5 9-5z"></path><path d="M3 8l9 5 9-5M12 13v8"></path></svg></span>Inventario</a>
      <a href="/pages/trabajador/qr-scan.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><path d="M14 14h3v3M14 21h3M21 14v3M21 21h.01"></path></svg></span>Escanear QR</a>
    </nav>
    <div id="sidebar-alertas"></div>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>

  <main class="main-content">
    <div class="topbar"><button id="menu-toggle" class="btn-menu-toggle">☰</button><h1>Revisión Post-Recojo</h1></div>
    <div class="card" style="max-width:680px" id="main-card">
      <p style="color:var(--text-muted)">Cargando alquiler...</p>
    </div>
  </main>
</div>

<script src="/assets/js/app.js"></script>
<script>
if (!['trabajador','dueno'].includes(Auth.usuario?.rol)) { location.href='/index.html'; throw new Error('rol'); }

const alqId = new URLSearchParams(location.search).get('id');
let alquiler = null;

async function cargar() {
  if (!alqId) { document.getElementById('main-card').innerHTML = '<p style="color:var(--danger)">ID de alquiler no proporcionado.</p>'; return; }
  try {
    alquiler = await apiFetch(`/alquileres/${alqId}`);
    if (alquiler.estado !== 'recogido') {
      document.getElementById('main-card').innerHTML = `<p style="color:var(--warn)">Este alquiler está en estado "${alquiler.estado}". La revisión solo aplica a alquileres recogidos.</p>`;
      return;
    }
    renderForm();
  } catch(e) { toast(e.message,'error'); }
}

function renderForm() {
  const items = alquiler.items;
  document.getElementById('main-card').innerHTML = `
    <div style="margin-bottom:16px">
      <strong>Alquiler #${alquiler.id}</strong> — Cliente: ${alquiler.cliente_nombre}<br/>
      <small style="color:var(--text-muted)">Revisa el estado de cada producto devuelto</small>
    </div>

    <div style="margin-bottom:16px;padding:12px;background:rgba(var(--success-rgb),.14);border-radius:8px;border:1px solid rgba(var(--success-rgb),.4)">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:600;color:var(--text)">
        <input type="checkbox" id="todo-conforme" onchange="toggleTodoConforme(this.checked)"/>
        Todo conforme (sin daños ni faltantes)
      </label>
    </div>

    <div id="items-detalle">
      ${items.map(i => `
        <div class="card" style="margin-bottom:12px;padding:14px" id="item-${i.id}">
          <div style="font-weight:600;margin-bottom:10px">${i.nombre} <span style="color:var(--text-muted)">(${i.cantidad} unid.)</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
            <div class="form-group" style="margin:0">
              <label>OK</label>
              <input type="number" class="form-control item-ok" data-id="${i.id}" min="0" max="${i.cantidad}" value="${i.cantidad}" />
            </div>
            <div class="form-group" style="margin:0">
              <label>Rotas</label>
              <input type="number" class="form-control item-rota" data-id="${i.id}" min="0" max="${i.cantidad}" value="0" />
            </div>
            <div class="form-group" style="margin:0">
              <label>Faltantes</label>
              <input type="number" class="form-control item-faltante" data-id="${i.id}" min="0" max="${i.cantidad}" value="0" />
            </div>
          </div>
          <div class="form-group" style="margin:4px 0 0">
            <label>Descripción del daño (opcional)</label>
            <input type="text" class="form-control item-desc" data-id="${i.id}" placeholder="Ej: copa rajada, mantel con mancha..."/>
          </div>
        </div>
      `).join('')}
    </div>

    <button class="btn btn-success" style="margin-top:8px" onclick="enviarRevision()">Enviar Revisión</button>
    <a href="/pages/trabajador/dashboard.html" class="btn btn-outline" style="margin-left:8px">Cancelar</a>`;
}

function toggleTodoConforme(checked) {
  document.querySelectorAll('.item-ok,.item-rota,.item-faltante,.item-desc').forEach(el => {
    el.disabled = checked;
  });
  if (checked) {
    document.querySelectorAll('.item-rota,.item-faltante').forEach(el => el.value = 0);
    alquiler.items.forEach(i => {
      const ok = document.querySelector(`.item-ok[data-id="${i.id}"]`);
      if (ok) ok.value = i.cantidad;
    });
  }
}

async function enviarRevision() {
  const todoConforme = document.getElementById('todo-conforme').checked;
  const items = alquiler.items.map(i => ({
    alquiler_item_id:  i.id,
    cantidad_ok:       parseInt(document.querySelector(`.item-ok[data-id="${i.id}"]`)?.value || 0),
    cantidad_rota:     parseInt(document.querySelector(`.item-rota[data-id="${i.id}"]`)?.value || 0),
    cantidad_faltante: parseInt(document.querySelector(`.item-faltante[data-id="${i.id}"]`)?.value || 0),
    descripcion_dano:  document.querySelector(`.item-desc[data-id="${i.id}"]`)?.value || null
  }));

  try {
    await apiFetch(`/alquileres/${alqId}/revision`, {
      method: 'POST',
      body: JSON.stringify({ items, todo_conforme: todoConforme })
    });
    toast('Revisión registrada correctamente');
    setTimeout(() => location.href = '/pages/trabajador/dashboard.html', 1500);
  } catch(e) { toast(e.message,'error'); }
}

cargar();
</script>
</body>
</html>
