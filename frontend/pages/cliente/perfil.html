<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Perfil — Menaje</title>
  <link rel="stylesheet" href="/assets/css/main.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand" style="display:flex;align-items:center;gap:10px"><img src="/assets/img/logo.png" alt="Menaje" width="28" height="28" style="object-fit:contain;flex:none"><span>Menaje</span></div>
    <a href="/pages/cliente/mi-cuenta.html" class="sidebar-user" style="display:flex;align-items:center;gap:11px;text-decoration:none;color:inherit;cursor:pointer"><div id="sidebar-user-avatar" style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#36ada3,#2f578a);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;flex:none"></div><div style="min-width:0"><strong id="sidebar-user-name" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></strong><span id="sidebar-user-rol"></span></div></a>
    <nav>
      <a href="/pages/cliente/catalogo.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l2.4 12.4a2 2 0 0 0 2 1.6h7.2a2 2 0 0 0 2-1.6L21 8H6"></path><circle cx="9" cy="20" r="1.3"></circle><circle cx="17" cy="20" r="1.3"></circle></svg></span>Catálogo</a>
      <a href="/pages/cliente/mis-alquileres.html"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2.2"></rect><path d="M9 4V3.2A1.2 1.2 0 0 1 10.2 2h3.6A1.2 1.2 0 0 1 15 3.2V4"></path><path d="M9 10h6M9 14h6M9 18h4"></path></svg></span>Mis Alquileres</a>
      <a href="/pages/cliente/perfil.html" class="active"><span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"></circle><path d="M5 20a7 7 0 0 1 14 0"></path></svg></span>Mi Perfil</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()" style="display:flex;align-items:center;justify-content:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Cerrar sesión</button></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <button id="menu-toggle" class="btn-menu-toggle">☰</button>
      <h1>Mi Perfil</h1>
    </div>
    <div class="card" style="max-width:480px">
      <div id="perfil-content"><p style="color:var(--text-muted)">Cargando...</p></div>
    </div>
  </main>
</div>
<script src="/assets/js/app.js"></script>
<script>
if (!Auth.requireAuth('cliente')) throw new Error('no auth');
async function cargar() {
  try {
    const u = await apiFetch('/perfil');
    document.getElementById('perfil-content').innerHTML = `
      <div style="display:grid;gap:10px;">
        <div><label style="font-size:.8rem;color:var(--text-muted)">Nombre</label><div style="font-size:1.1rem;font-weight:600">${u.nombre}</div></div>
        <div><label style="font-size:.8rem;color:var(--text-muted)">DNI</label><div>${u.dni}</div></div>
        <div><label style="font-size:.8rem;color:var(--text-muted)">Teléfono</label><div>${u.telefono || '—'}</div></div>
        <div><label style="font-size:.8rem;color:var(--text-muted)">Correo</label><div>${u.correo}</div></div>
        <div><label style="font-size:.8rem;color:var(--text-muted)">Descuento como cliente frecuente</label>
          <div style="font-size:1.3rem;font-weight:700;color:var(--success)">${u.descuento_pct > 0 ? u.descuento_pct+'%' : 'Sin descuento aún'}</div></div>
        <div><label style="font-size:.8rem;color:var(--text-muted)">Miembro desde</label><div>${fmtFecha(u.created_at)}</div></div>
      </div>`;
  } catch(e) { toast(e.message,'error'); }
}
cargar();
</script>
</body>
</html>
